# Based on Material for MkDocs: https://squidfunk.github.io/mkdocs-material/publishing-your-site/
name: ci

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write  # Required for mkdocs gh-deploy to push to gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git Credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache dependencies
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache
          restore-keys: |
            mkdocs-material-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Prepare for link check
        run: |
          mkdir -p temp-root
          ln -s "$(pwd)/site" temp-root/mkdocs-poc

      - name: Link check (dead link detection)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir temp-root
            --verbose --no-progress
            --exclude '127\.0\.0\.1'
            --exclude 'your-org\.github\.io'
            --exclude 'github\.com/your-org'
            --exclude 'httpbin\.org/status/404'
            ./site
          fail: true

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
